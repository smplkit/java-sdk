name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
    inputs:
      manual_version:
        description: "Force version"
        required: false
        default: ""

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Compile (lint)
        run: ./gradlew classes testClasses

  build:
    name: Build & Test (JDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [17, 21]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build

      - name: Upload coverage report
        # Run on failure too so we can diagnose intermittent JaCoCo
        # coverage-gate flakes — the report (HTML + XML + .exec) is generated
        # by jacocoTestReport, which runs before jacocoTestCoverageVerification.
        # Upload from both JDK 17 and JDK 21 since the flake can hit either.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-jdk-${{ matrix.java-version }}
          path: |
            build/reports/jacoco/test/
            build/jacoco/test.exec
            build/reports/tests/test/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-min-floor:
    # Prove the SDK still compiles and its tests pass at the lowest declared
    # customer-facing Jackson floor (2.16.0 — where jsr310 JavaTimeFeature,
    # used by the generated RFC3339InstantDeserializer, was introduced). Without
    # this, the `[2.16.0,)` range in build.gradle.kts is aspirational: normal
    # CI builds against the latest Jackson and could silently start using a
    # 2.17+ API that breaks consumers pinned to 2.16.
    name: Test min Jackson floor (JDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [17, 21]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and test with Jackson pinned to the declared floor
        run: ./gradlew build -PjacksonFloorOverride=2.16.0

  ci-gate:
    if: always()
    needs: [lint, build, test-min-floor]
    runs-on: ubuntu-latest
    steps:
      - uses: smplkit/.github-public/actions/ci-gate@main
        with:
          needs: ${{ toJson(needs) }}

  release:
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare release
        id: prep
        uses: smplkit/.github-public/actions/sdk-release-prepare@main
        with:
          manual_version: ${{ github.event.inputs.manual_version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        if: steps.prep.outputs.released == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle
        if: steps.prep.outputs.released == 'true'
        uses: gradle/actions/setup-gradle@v6

      - name: Publish to Maven Central
        if: steps.prep.outputs.released == 'true'
        run: ./gradlew publishAndReleaseToMavenCentral -PprojectVersion=${{ steps.prep.outputs.version }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Summary
        run: |
          echo "## Publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.prep.outputs.released }}" = "true" ]; then
            echo "**Version:** v${{ steps.prep.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Published to Maven Central:** yes" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No release warranted by commits since last release." >> "$GITHUB_STEP_SUMMARY"
          fi
